<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Очистка 1000 НЕТ</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111318;
        background:
          radial-gradient(circle at 20% 0%, rgba(255, 210, 31, 0.42), transparent 18rem),
          linear-gradient(135deg, #fffaf0, #ebe6dd);
      }
      .card {
        width: min(560px, 100%);
        padding: 28px;
        border: 1px solid rgba(255,255,255,.72);
        border-radius: 30px;
        background: rgba(255,255,255,.72);
        box-shadow: 0 24px 90px rgba(0,0,0,.14);
        backdrop-filter: blur(24px);
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 12vw, 86px);
        line-height: .9;
        letter-spacing: -.07em;
        text-transform: uppercase;
      }
      p {
        margin: 16px auto 0;
        max-width: 420px;
        color: #626975;
        font-size: 17px;
        line-height: 1.45;
      }
      .loader {
        width: 64px;
        height: 64px;
        margin: 24px auto 0;
        border: 8px solid rgba(17,19,24,.1);
        border-top-color: #FFD21F;
        border-radius: 999px;
        animation: spin .8s linear infinite;
      }
      button {
        min-height: 58px;
        margin-top: 22px;
        padding: 0 22px;
        border: 0;
        border-radius: 18px;
        background: #FFD21F;
        color: #111318;
        font-weight: 1000;
        font-size: 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Чистим кэш</h1>
      <p>Удаляю старую PWA-версию и перезапускаю сервис. Это займёт несколько секунд.</p>
      <div class="loader"></div>
      <button id="manual" type="button">Открыть сервис вручную</button>
    </main>
    <script>
      async function clearEverything() {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
        } catch (error) {}

        try {
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (error) {}

        try {
          localStorage.removeItem('one-thousand-no-onboarding-complete');
        } catch (error) {}

        window.location.replace('/1000net/?clean=' + Date.now());
      }

      document.getElementById('manual').addEventListener('click', clearEverything);
      clearEverything();
    </script>
  </body>
</html>
